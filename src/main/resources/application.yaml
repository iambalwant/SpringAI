spring:
  application:
    name: ollama
  datasource:
    url: jdbc:postgresql://localhost:5432/admin?currentSchema=spring_ai_yt
    username: admin
    password: password
  ai:
    chat:
      client:
        enable: true
      memory:
        repository:
          jdbc:
            initialize-schema: ALWAYS
#    openai:
#      api-key: ${OPENAI_API_KEY}
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:1b
        temperature: 0.7
logging:
  level:
   org.springframework.ai.chat.client.advisor: DEBUG
server:
  port: 9009
